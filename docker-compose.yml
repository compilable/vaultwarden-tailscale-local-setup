
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    network_mode: service:tailscale # Vaultwarden shares the network stack with Tailscale
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_healthy
        restart: true
    volumes:
      - ./vw-data:/data:rw
      - ./vw-logs:/logs:rw
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - DOMAIN=${DOMAIN}
      - ROCKET_PORT=${ROCKET_PORT}
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED}
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED}
      - SHOW_PASSWORD_HINT=${SHOW_PASSWORD_HINT}
      - SENDS_ALLOWED=true
      - EMERGENCY_ACCESS_ALLOWED=true
      - WEB_VAULT_ENABLED=true
      - LOG_FILE=/logs/vaultwarden.log
      - LOG_LEVEL=warn
      - EXTENDED_LOGGING=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${ROCKET_PORT}/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tailscale:
    image: ghcr.io/tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - "/usr/local/bin/containerboot & until tailscale status >/dev/null 2>&1; do sleep 1; done; sleep 12; tailscale funnel --bg --https=443 80 || true; sleep 5; tailscale funnel --bg --https=443 80 || true; wait -n"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_CERT_DOMAIN=${TS_CERT_DOMAIN}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--accept-dns=false --accept-routes
    volumes:
      - ./tailscale-config:/config
      - ./tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --json 2>/dev/null | grep -Eq '\"BackendState\":[[:space:]]*\"Running\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
